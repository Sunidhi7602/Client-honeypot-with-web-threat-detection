<!DOCTYPE html>
<html>
<head>
  <title>HoneyScan Fresh</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body { font-family: system-ui; background: #0a0a0a; color: white; padding: 20px; }
    .dashboard { display: grid; gap: 20px; }
    .scan-form { background: #1a1a1a; padding: 20px; border-radius: 8px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .stat { background: #2a2a2a; padding: 20px; border-radius: 8px; }
    .scans { max-height: 400px; overflow: auto; }
    .scan { background: #1a1a1a; padding: 10px; margin: 5px 0; border-radius: 4px; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
    .logs { background: #000; padding: 10px; height: 200px; overflow: auto; font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>
  <h1>🍯 HoneyScan Fresh (Minimal)</h1>
  
  <div class="dashboard">
    <div>
      <h2>Scanner</h2>
      <div class="scan-form">
        <input id="url" placeholder="https://example.com" style="width: 300px; padding: 10px;">
        <button onclick="scan()">Scan</button>
        <div id="logs" class="logs"></div>
      </div>
    </div>
    
    <div>
      <h2>Dashboard Stats</h2>
      <div class="stats" id="stats"></div>
    </div>
    
    <div>
      <h2>Recent Scans</h2>
      <div class="scans" id="scans"></div>
    </div>
  </div>

  <script>
    const socket = io();
    const logs = document.getElementById('logs');
    
    socket.on('scan:progress', (data) => {
      logs.innerHTML += `[LOG] ${data.message}\\n`;
      logs.scrollTop = logs.scrollHeight;
    });

    async function scan() {
      const url = document.getElementById('url').value;
      if (!url) return;
      
      logs.innerHTML = 'Scanning...\\n';
      const res = await fetch('/api/scans', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({url})
      });
      const {scan} = await res.json();
      
      socket.emit('subscribe', {scanId: scan.id});
      logs.innerHTML += `Scan ID: ${scan.id} Score: ${scan.threatScore} (${scan.riskLevel})\\n`;
    }

    async function loadData() {
      const statsRes = await fetch('/api/stats/overview');
      const stats = await statsRes.json();
      document.getElementById('stats').innerHTML = `
        <div class="stat">Total Scans: ${stats.totalScans}</div>
        <div class="stat">Critical: ${stats.criticalThreats}</div>
        <div class="stat">Avg Score: ${stats.avgThreatScore}</div>
      `;
      
      const scansRes = await fetch('/api/scans');
      const {scans} = await scansRes.json();
      document.getElementById('scans').innerHTML = scans.map(s => 
        `<div class="scan">
          <strong>${s.url}</strong> - ${s.riskLevel} (${s.threatScore})
          <small>${new Date(s.submittedAt).toLocaleString()}</small>
        </div>`
      ).join('');
    }
    
    loadData();
    setInterval(loadData, 5000);
  </script>
</body>
</html>
