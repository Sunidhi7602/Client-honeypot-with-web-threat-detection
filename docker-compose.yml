

services:
  mongodb:
    image: mongo:7.0
    container_name: honeyscan_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: honeyscan
      MONGO_INITDB_ROOT_PASSWORD: honeyscan_secret
      MONGO_INITDB_DATABASE: honeyscan
      MONGO_INITDB_DATABASE_admin__honeyscan: honeyscan_secret
    volumes:
      - mongo_data:/data/db
    networks:
      - honeyscan_net
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand({ ping: 1 }).ok\" | grep 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7.2-alpine
    container_name: honeyscan_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - honeyscan_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: honeyscan_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-5000}
      MONGO_URI: ${MONGO_URI_DOCKER:-mongodb://honeyscan:honeyscan_secret@mongodb:27017/honeyscan?authSource=admin&authMechanism=DEFAULT}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_very_long_secret}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
    volumes:
      - ./server/captures:/app/captures
      - /var/log/suricata:/var/log/suricata:ro
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - honeyscan_net
    # Required for VirtualBox access on host
    privileged: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: honeyscan_client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - honeyscan_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:
  redis_data:

networks:
  honeyscan_net:
    driver: bridge
